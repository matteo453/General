<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista Generale — Costi Totali Cantieri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f3ef; --surface:#fff; --surface2:#eceae4; --surface3:#f9f8f5;
  --border:#e0dcd4; --border2:#ccc8bf;
  --text:#1a1917; --text2:#6b6760; --text3:#aaa89f;
  --blue:#2563eb; --blue-bg:#eff6ff; --blue-light:#bfdbfe;
  --green:#16a34a; --green-bg:#f0fdf4; --green-light:#bbf7d0;
  --amber:#d97706; --amber-bg:#fffbeb; --amber-light:#fde68a;
  --red:#dc2626; --red-bg:#fef2f2;
  --purple:#7c3aed; --purple-bg:#f5f3ff;
  --r:10px; --r-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand .icon{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-brand .icon svg{width:16px;height:16px;fill:#fff}
.topbar-brand h1{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-brand .sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:6px}
.topbar-right{display:flex;gap:8px;align-items:center}
.meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:4px 10px;font-size:11px}

/* WRAP */
.wrap{max-width:1440px;margin:0 auto;padding:22px 28px}

/* FILTER BAR */
.filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:18px}
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;min-width:70px;flex-shrink:0}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pill{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pill.active-green{background:var(--green);color:#fff;border-color:var(--green)}
.pill.active-amber{background:var(--amber);color:#fff;border-color:var(--amber)}
.filter-search{flex:1;min-width:180px;height:30px;padding:0 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.filter-search:focus{border-color:var(--blue)}
.active-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.active-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-light);cursor:pointer;transition:all .15s}
.active-chip:hover{background:#dbeafe}
.active-chip .chip-x{font-size:13px;line-height:1;margin-left:2px;opacity:.7}
.reset-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
.reset-btn:hover{color:var(--red)}

/* KPI GRID */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.kpi-value{font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1}
.kpi-value.sm{font-size:16px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.kpi-accent-blue .kpi-value{color:var(--blue)}
.kpi-accent-green .kpi-value{color:var(--green)}
.kpi-accent-amber .kpi-value{color:var(--amber)}
.kpi-accent-purple .kpi-value{color:var(--purple)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--surface)}
tbody td{padding:10px 10px;border-bottom:1px solid #f3f1ec;font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface3)}
.num{text-align:right;font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap}
.cant-name{font-weight:500;white-space:nowrap}
.cant-name a{color:var(--text);text-decoration:none}

/* PROGRESS BAR */
.bar-cell{min-width:120px}
.bar-wrap{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--surface2);gap:1px}
.bar-seg{height:100%;transition:width .3s}
.bar-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--text3)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--text3)}
.b-red{background:var(--red-bg);color:var(--red)}

/* ALERT */
.alert{border-radius:var(--r);padding:11px 14px;font-size:12px;margin-bottom:14px;display:none;border:1px solid}
.alert-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-light)}
.alert-red{background:var(--red-bg);color:var(--red);border-color:#fecaca}

/* LOADING */
.state-box{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-step{font-size:12px;color:var(--text3);margin-top:6px;font-family:'DM Mono',monospace}

/* CHART GRID */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:1100px){.chart-grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.chart-grid-3{grid-template-columns:1fr}}

/* SECTION DIVIDER */
.section-head{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.section-head h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* TOTALE ROW */
.total-row td{font-weight:600;background:var(--surface3)!important;border-top:1px solid var(--border2)}

/* STATUS INDICATOR */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="icon"><svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zm7 0h5v5H9zm0 7h5v5H9zM2 9h5v5H2z"/></svg></div>
    <h1>Vista Generale Cantieri</h1>
    <span class="sub" id="meta-info">caricamento...</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-sm" onclick="loadAll()">↻ Aggiorna</button>
    <a href="./dashboard_fatture_1.html" class="btn btn-sm">Fatture →</a>
    <a href="../presenze/" class="btn btn-sm">Presenze →</a>
  </div>
</div>

<div class="wrap">
  <div class="alert alert-red" id="err-box"></div>
  <div class="alert alert-amber" id="warn-box"></div>

  <div id="root">
    <div class="state-box">
      <div class="spinner"></div>
      <p style="font-size:14px;font-weight:500">Caricamento dati in corso...</p>
      <div class="load-step" id="load-step">Connessione ai fogli Google...</div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const URL_FATTURE   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7CrgavtKZ1lfDpoU0_ydZ4_5LMEGELUn00y0Ve62pm0NGCS353e0ZWzyUT3M5BhKEVgq9oHX1-3Wn/pub?output=csv&gid=1367053986';
const URL_PRESENZE  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh4s5_G_F6JSMly4krWfEVbYZCLDRsddlIX0OlfQs4Lhqk2OKOB_oYOXgYY0YlL9nvKz5hWkkq2jYD/pub?gid=0&single=true&output=csv';
const SPECIALI      = ['vincenzo','valentin'];

// Mapping Geobadge → FattureInCloud (aggiornabile)
const MAPPING = [
  {presenze:'Aeroporto Oscar Savini a Bracciano (RM)', fatture:'aeroporto savini',          label:'Aeroporto Savini'},
  {presenze:'Autostrade Fiano Romano',                 fatture:'Autostrade',                label:'Autostrade Fiano Romano'},
  {presenze:'Cantiere Anticoli Corrado',               fatture:'ANTICOLI CORRADO',          label:'Anticoli Corrado'},
  {presenze:'Cantiere comune di Canale di Monterano',  fatture:'Canale Monterano',          label:'Canale Monterano'},
  {presenze:'Cantiere Studio del Notariato',           fatture:'Cassa del Notariato',       label:'Studio del Notariato'},
  {presenze:'Sede Operativa 1 - Giardinetti',          fatture:null,                        label:'Sede Giardinetti'},
  {presenze:'Via Don Primo Mazzolari - Comune di Roma',fatture:null,                        label:'Via Don Primo Mazzolari'},
  {presenze:null,                                      fatture:'borghesiana ED',            label:'Borghesiana'},
  {presenze:null,                                      fatture:'APPARTAMENTO',              label:'Appartamento'},
];

// ─── UTILS ───────────────────────────────────────────────────────────────────
function num(v){
  if(!v&&v!==0)return 0;
  const s=String(v).trim().replace(/\s/g,'');
  if(s.includes(',')&&s.includes('.'))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
  if(s.includes(','))return parseFloat(s.replace(',','.'))||0;
  return parseFloat(s)||0;
}
function eur(v){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(num(v))}
function eur2(v){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(num(v))}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'—'}
function getYear(d){try{const y=new Date(d).getFullYear();return isNaN(y)?null:y+''}catch{return null}}
function step(msg){const el=document.getElementById('load-step');if(el)el.textContent=msg}

// ─── FETCH CSV ────────────────────────────────────────────────────────────────
async function fetchCSV(url,label){
  step('Caricamento '+label+'...');
  const res=await fetch(url,{cache:'no-cache'});
  if(!res.ok)throw new Error(label+': HTTP '+res.status);
  const text=await res.text();
  if(!text||text.length<50)throw new Error(label+': risposta vuota');
  return text;
}

// ─── PARSE FATTURE ────────────────────────────────────────────────────────────
function parseFatture(text){
  const r=Papa.parse(text,{header:true,skipEmptyLines:true,transformHeader:h=>h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  return r.data.map(row=>({
    rc_center:(row.rc_center||'').trim()||'Non assegnato',
    amount_gross:num(row.amount_gross),
    amount_net:num(row.amount_net),
    amount_vat:num(row.amount_vat),
    date:row.date||'',
    year:getYear(row.date),
    supplier:(row.supplier_name||'').trim(),
    description:(row.description||'').trim()
  }));
}

// ─── PARSE PRESENZE ───────────────────────────────────────────────────────────
function parsePresenze(text){
  const lines=text.trim().split(/\r?\n/);
  function parseRow(line){const cols=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){cols.push(c);c=''}else c+=ch}cols.push(c);return cols}
  const hdr=parseRow(lines[0]).map(h=>h.replace(/"/g,'').trim());
  function get(cols,name){const i=hdr.indexOf(name);return i>=0?(cols[i]||'').replace(/"/g,'').trim():''}
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=parseRow(lines[i]);
    if(get(c,'Verso')!=='Entrata')continue;
    const dr=get(c,'Data');
    if(!dr)continue;
    const parts=dr.split('/');
    const dateISO=parts.length===3?`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`:dr;
    const nome=get(c,'Nome');
    const costo=SPECIALI.some(s=>nome.toLowerCase().startsWith(s))?150:100;
    rows.push({
      cantiere:get(c,'Cantiere'),
      nome,cognome:get(c,'Cognome'),
      data:dateISO,
      year:getYear(dateISO),
      costo
    });
  }
  return rows;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let fatture=[],presenze=[],yearFilter='';
let cantieriFilter=new Set(); // set of mapped cantiere LABELS
let categoriaFilter='';       // text search on description
let stackedChart=null,pieChart=null,catChart=null;

// Cantiere labels disponibili (dall'aggregazione mapping)
function getAllCantieriLabels(){
  const labels=new Set();
  MAPPING.forEach(m=>{
    const hasFatture=m.fatture&&fatture.some(r=>r.rc_center===m.fatture);
    const hasPresenze=m.presenze&&presenze.some(r=>r.cantiere===m.presenze);
    if(hasFatture||hasPresenze) labels.add(m.label);
  });
  return[...labels].sort();
}

// Base fatture filtrate per anno + categoria (NON per cantiere — quello avviene in buildCantieri)
function baseFatture(){
  let d=fatture;
  if(yearFilter) d=d.filter(r=>r.year===yearFilter);
  if(categoriaFilter) d=d.filter(r=>r.description.toLowerCase().includes(categoriaFilter.toLowerCase())||r.supplier.toLowerCase().includes(categoriaFilter.toLowerCase()));
  return d;
}

// Base presenze filtrate per anno
function basePresenze(){
  return yearFilter?presenze.filter(r=>r.year===yearFilter):presenze;
}

function getYears(){
  const s=new Set([...fatture.map(r=>r.year),...presenze.map(r=>r.year)].filter(Boolean));
  return[...s].sort();
}

// Categorie top (da description, con importo)
function getTopCategorie(bf, n=15){
  const m={};
  bf.filter(r=>r.rc_center!=='Non assegnato'&&r.description).forEach(r=>{
    const cat=r.description.length>40?r.description.slice(0,40)+'…':r.description;
    m[cat]=(m[cat]||0)+r.amount_gross;
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

// ─── AGGREGATION ─────────────────────────────────────────────────────────────
function buildCantieri(){
  const bf=baseFatture();
  const bp=basePresenze();

  // Map fatture by rc_center
  const fMap={};
  bf.forEach(r=>{
    const k=r.rc_center;
    if(!fMap[k])fMap[k]={gross:0,net:0,count:0};
    fMap[k].gross+=r.amount_gross;
    fMap[k].net+=r.amount_net;
    fMap[k].count++;
  });

  // Map presenze by cantiere
  const pMap={};
  bp.forEach(r=>{
    const k=r.cantiere;
    if(!pMap[k])pMap[k]={costo:0,giorni:0};
    pMap[k].costo+=r.costo;
    pMap[k].giorni++;
  });

  // Build unified rows via mapping
  const rows=[];
  const usedF=new Set();
  const usedP=new Set();

  MAPPING.forEach(m=>{
    const fKey=m.fatture;
    const pKey=m.presenze;
    const costoForniture=fKey&&fMap[fKey]?fMap[fKey].gross:0;
    const numFatture=fKey&&fMap[fKey]?fMap[fKey].count:0;
    const costoManodopera=pKey&&pMap[pKey]?pMap[pKey].costo:0;
    const giorniPresenza=pKey&&pMap[pKey]?pMap[pKey].giorni:0;
    const totale=costoForniture+costoManodopera;
    if(totale===0&&giorniPresenza===0&&numFatture===0)return;
    rows.push({
      label:m.label,
      fKey,pKey,
      costoForniture,costoManodopera,totale,
      numFatture,giorniPresenza,
      hasFatture:!!fKey,hasPresenze:!!pKey,
      matched:!!fKey&&!!pKey
    });
    if(fKey)usedF.add(fKey);
    if(pKey)usedP.add(pKey);
  });

  // Unmapped fatture
  Object.keys(fMap).forEach(k=>{
    if(usedF.has(k)||k==='Non assegnato')return;
    rows.push({label:k,fKey:k,pKey:null,costoForniture:fMap[k].gross,costoManodopera:0,totale:fMap[k].gross,numFatture:fMap[k].count,giorniPresenza:0,hasFatture:true,hasPresenze:false,matched:false});
  });

  // Unmapped presenze
  Object.keys(pMap).forEach(k=>{
    if(usedP.has(k))return;
    rows.push({label:k,fKey:null,pKey:k,costoForniture:0,costoManodopera:pMap[k].costo,totale:pMap[k].costo,numFatture:0,giorniPresenza:pMap[k].giorni,hasFatture:false,hasPresenze:true,matched:false});
  });

  return rows
    .filter(r=>cantieriFilter.size===0||cantieriFilter.has(r.label))
    .sort((a,b)=>b.totale-a.totale);
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('root').innerHTML=`<div class="state-box"><div class="spinner"></div><p style="font-size:14px;font-weight:500">Caricamento dati...</p><div class="load-step" id="load-step">Connessione...</div></div>`;
  clearAlerts();
  try{
    const [tF,tP]=await Promise.all([
      fetchCSV(URL_FATTURE,'fatture'),
      fetchCSV(URL_PRESENZE,'presenze')
    ]);
    step('Elaborazione dati...');
    fatture=parseFatture(tF);
    presenze=parsePresenze(tP);
    const warns=[];
    if(fatture.length<10)warns.push('Fatture: solo '+fatture.length+' righe caricate.');
    if(presenze.length<10)warns.push('Presenze: solo '+presenze.length+' righe caricate.');
    if(warns.length)showWarn(warns.join(' — ')+' Prova a ricaricare o usa il CSV locale.');
    document.getElementById('meta-info').textContent=
      fatture.length.toLocaleString('it-IT')+' fatture · '+
      presenze.length.toLocaleString('it-IT')+' presenze · '+
      new Date().toLocaleTimeString('it-IT');
    render();
  }catch(e){
    showErr('Errore: '+e.message);
    document.getElementById('root').innerHTML='<div class="state-box"><p>Errore nel caricamento. Riprova.</p></div>';
  }
}

function render(){
  if(stackedChart){stackedChart.destroy();stackedChart=null}
  if(pieChart){pieChart.destroy();pieChart=null}
  if(catChart){catChart.destroy();catChart=null}

  const rows=buildCantieri();
  const bf=baseFatture();
  const bp=basePresenze();
  const years=getYears();
  const allCantLabels=getAllCantieriLabels();
  const topCat=getTopCategorie(bf,12);

  // Global KPIs (su dati filtrati)
  const totalForniture=rows.reduce((s,r)=>s+r.costoForniture,0);
  const totalManodopera=rows.reduce((s,r)=>s+r.costoManodopera,0);
  const totaleCantieri=totalForniture+totalManodopera;
  const naForniture=bf.filter(r=>r.rc_center==='Non assegnato').reduce((s,r)=>s+r.amount_gross,0);
  const matched=rows.filter(r=>r.matched).length;
  const totalGiorni=bp.length;

  // Filtri attivi come chip
  const activeChips=[];
  if(yearFilter) activeChips.push({label:'Anno: '+yearFilter,action:"_yr('')"});
  cantieriFilter.forEach(c=>activeChips.push({label:'Cantiere: '+c,action:`_removeCant('${c.replace(/'/g,"\\'")}')`}));
  if(categoriaFilter) activeChips.push({label:'Categoria: "'+categoriaFilter+'"',action:"_clearCat()"});

  document.getElementById('root').innerHTML=`

<!-- FILTER PANEL -->
<div class="filter-panel">
  <div class="filter-row">
    <span class="filter-label">Anno</span>
    <div class="filter-pills">
      <button onclick="_yr('')" class="pill${yearFilter===''?' active':''}">Tutti</button>
      ${years.map(y=>`<button onclick="_yr('${y}')" class="pill${yearFilter===y?' active':''}">${y}</button>`).join('')}
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Cantiere</span>
    <div class="filter-pills">
      ${allCantLabels.map(c=>`<button onclick="_toggleCant('${c.replace(/'/g,"\\'")}')" class="pill${cantieriFilter.has(c)?' active-green':''}">${c}</button>`).join('')}
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Categoria</span>
    <input class="filter-search" id="cat-search" type="search"
      placeholder="Cerca in descrizione / fornitore..."
      value="${categoriaFilter.replace(/"/g,'&quot;')}"
      oninput="_setCat(this.value)">
  </div>
  ${activeChips.length>0?`
  <div class="active-filters">
    <span style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Attivi:</span>
    ${activeChips.map(c=>`<span class="active-chip" onclick="${c.action}">${c.label}<span class="chip-x">×</span></span>`).join('')}
    <button class="reset-btn" onclick="_resetAll()">reset tutto</button>
  </div>`:''}
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi kpi-accent-blue">
    <div class="kpi-label">Costo totale cantieri</div>
    <div class="kpi-value sm">${eur(totaleCantieri)}</div>
    <div class="kpi-sub">forniture + manodopera</div>
  </div>
  <div class="kpi kpi-accent-green">
    <div class="kpi-label">Forniture (fatture)</div>
    <div class="kpi-value sm">${eur(totalForniture)}</div>
    <div class="kpi-sub">${rows.reduce((s,r)=>s+r.numFatture,0)} fatture filtrate</div>
  </div>
  <div class="kpi kpi-accent-amber">
    <div class="kpi-label">Manodopera (presenze)</div>
    <div class="kpi-value sm">${eur(totalManodopera)}</div>
    <div class="kpi-sub">${totalGiorni.toLocaleString('it-IT')} giornate lavorate</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">% Manodopera</div>
    <div class="kpi-value">${pct(totalManodopera,totaleCantieri)}</div>
    <div class="kpi-sub">${pct(totalForniture,totaleCantieri)} forniture</div>
  </div>
  <div class="kpi kpi-accent-purple">
    <div class="kpi-label">Cantieri abbinati</div>
    <div class="kpi-value">${matched}</div>
    <div class="kpi-sub">su ${rows.length} visualizzati</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Non assegnato</div>
    <div class="kpi-value sm" style="color:var(--red)">${eur(naForniture)}</div>
    <div class="kpi-sub">${bf.filter(r=>r.rc_center==='Non assegnato').length.toLocaleString('it-IT')} fatture senza cantiere</div>
  </div>
</div>

<!-- CHARTS ROW 1: stacked + pie -->
<div class="chart-grid">
  <div class="card" style="margin-bottom:0">
    <div class="card-title">
      <span class="dot" style="background:var(--green)"></span>
      Costo per cantiere — forniture vs manodopera
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Forniture</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>Manodopera</div>
    </div>
    <div style="position:relative;width:100%;height:${Math.max(200,rows.filter(r=>r.totale>0).length*36+60)}px">
      <canvas id="stackedChart"></canvas>
    </div>
  </div>
  <div class="card" style="margin-bottom:0">
    <div class="card-title">
      <span class="dot" style="background:var(--blue)"></span>
      Peso % per cantiere
    </div>
    <div style="position:relative;width:100%;height:260px">
      <canvas id="pieChart"></canvas>
    </div>
  </div>
</div>

<!-- CHARTS ROW 2: categoria -->
<div class="card">
  <div class="card-title">
    <span class="dot" style="background:var(--amber)"></span>
    Spesa per categoria (top descrizioni fatture)
    ${categoriaFilter?`<span class="badge b-amber" style="font-size:10px">filtro: "${categoriaFilter}"</span>`:''}
  </div>
  ${topCat.length===0
    ?'<p style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Nessuna categoria trovata con i filtri attivi</p>'
    :`<div style="position:relative;width:100%;height:${Math.max(180,topCat.length*28+50)}px">
      <canvas id="catChart"></canvas>
    </div>`}
</div>

<!-- MAIN TABLE -->
<div class="section-head"><h2>Dettaglio per cantiere${cantieriFilter.size>0?' — filtrato':''}</h2></div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Cantiere</th>
        <th>Stato</th>
        <th style="text-align:right">Forniture</th>
        <th style="text-align:right">Fatture</th>
        <th style="text-align:right">Manodopera</th>
        <th style="text-align:right">Giornate</th>
        <th style="text-align:right">Totale</th>
        <th style="min-width:140px">Ripartizione</th>
        <th style="text-align:right">% Man.</th>
      </tr></thead>
      <tbody>
      ${rows.length===0
        ?'<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:30px">Nessun risultato con i filtri attivi</td></tr>'
        :rows.map(r=>{
          const pctF=r.totale>0?(r.costoForniture/r.totale*100):0;
          const pctM=r.totale>0?(r.costoManodopera/r.totale*100):0;
          let badge='';
          if(r.matched)badge='<span class="badge b-green">● abbinato</span>';
          else if(r.hasFatture&&!r.hasPresenze)badge='<span class="badge b-amber">solo fatture</span>';
          else if(!r.hasFatture&&r.hasPresenze)badge='<span class="badge b-blue">solo presenze</span>';
          return`<tr>
            <td class="cant-name">${r.label}</td>
            <td>${badge}</td>
            <td class="num">${r.costoForniture>0?eur(r.costoForniture):'<span style="color:var(--text3)">—</span>'}</td>
            <td class="num" style="color:var(--text3)">${r.numFatture>0?r.numFatture:'—'}</td>
            <td class="num">${r.costoManodopera>0?eur(r.costoManodopera):'<span style="color:var(--text3)">—</span>'}</td>
            <td class="num" style="color:var(--text3)">${r.giorniPresenza>0?r.giorniPresenza:'—'}</td>
            <td class="num" style="font-weight:600">${eur(r.totale)}</td>
            <td class="bar-cell">
              <div class="bar-wrap">
                <div class="bar-seg" style="width:${pctF.toFixed(1)}%;background:#16a34a"></div>
                <div class="bar-seg" style="width:${pctM.toFixed(1)}%;background:#2563eb"></div>
              </div>
              <div class="bar-labels"><span>${pctF.toFixed(0)}% forn.</span><span>${pctM.toFixed(0)}% man.</span></div>
            </td>
            <td class="num">${r.totale>0?pctM.toFixed(1)+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot>
        <tr class="total-row">
          <td style="font-weight:600">TOTALE</td><td></td>
          <td class="num">${eur(totalForniture)}</td>
          <td class="num" style="color:var(--text3)">${rows.reduce((s,r)=>s+r.numFatture,0)}</td>
          <td class="num">${eur(totalManodopera)}</td>
          <td class="num" style="color:var(--text3)">${rows.reduce((s,r)=>s+r.giorniPresenza,0)}</td>
          <td class="num" style="font-weight:700">${eur(totaleCantieri)}</td>
          <td></td>
          <td class="num">${pct(totalManodopera,totaleCantieri)}</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<!-- NON ASSEGNATO WARNING -->
${naForniture>0?`
<div class="section-head"><h2>Fatture senza cantiere (non assegnato)</h2></div>
<div class="card" style="border-color:#fecaca;background:var(--red-bg)">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <p style="font-weight:600;color:var(--red);margin-bottom:4px">${eur(naForniture)} in fatture senza cantiere assegnato</p>
      <p style="font-size:12px;color:var(--text2)">${bf.filter(r=>r.rc_center==='Non assegnato').length.toLocaleString('it-IT')} fatture · non incluse nei totali sopra</p>
    </div>
    <a href="./dashboard_fatture_1.html" class="btn" style="color:var(--red);border-color:#fecaca">Vai alle fatture →</a>
  </div>
</div>`:''}
`;

  // ── Stacked bar ──
  const chartRows=rows.filter(r=>r.totale>0);
  stackedChart=new Chart(document.getElementById('stackedChart'),{
    type:'bar',
    data:{
      labels:chartRows.map(r=>r.label),
      datasets:[
        {label:'Forniture',data:chartRows.map(r=>Math.round(r.costoForniture)),backgroundColor:'#16a34a',borderRadius:0,borderWidth:0},
        {label:'Manodopera',data:chartRows.map(r=>Math.round(r.costoManodopera)),backgroundColor:'#2563eb',borderRadius:4,borderWidth:0}
      ]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${eur(ctx.raw)}`}}},
      scales:{
        x:{stacked:true,ticks:{callback:v=>eur(v),font:{size:10},color:'#aaa89f'},grid:{color:'rgba(0,0,0,0.04)'}},
        y:{stacked:true,ticks:{font:{size:12},color:'#6b6760'}}
      }
    }
  });

  // ── Pie ──
  const pieRows=rows.filter(r=>r.totale>0);
  const COLORS=['#2563eb','#16a34a','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#0f766e'];
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{
      labels:pieRows.map(r=>r.label),
      datasets:[{data:pieRows.map(r=>Math.round(r.totale)),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:8,boxWidth:10,boxHeight:10}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${eur(ctx.raw)} (${pct(ctx.raw,pieRows.reduce((s,r)=>s+r.totale,0))})`}}
      }
    }
  });

  // ── Categoria bar ──
  if(topCat.length>0&&document.getElementById('catChart')){
    catChart=new Chart(document.getElementById('catChart'),{
      type:'bar',
      data:{
        labels:topCat.map(x=>x[0]),
        datasets:[{
          label:'Importo',
          data:topCat.map(x=>Math.round(x[1])),
          backgroundColor:'#d97706',
          borderRadius:4,borderWidth:0
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${eur(ctx.raw)}`}}},
        scales:{
          x:{ticks:{callback:v=>eur(v),font:{size:10},color:'#aaa89f'},grid:{color:'rgba(0,0,0,0.04)'}},
          y:{ticks:{font:{size:11},color:'#6b6760'}}
        }
      }
    });
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function showErr(m){const b=document.getElementById('err-box');b.textContent='⚠ '+m;b.style.display='block'}
function showWarn(m){const b=document.getElementById('warn-box');b.textContent='ℹ '+m;b.style.display='block'}
function clearAlerts(){['err-box','warn-box'].forEach(id=>document.getElementById(id).style.display='none')}

window._yr          = function(y){ yearFilter=y; render(); };
window._toggleCant  = function(c){ cantieriFilter.has(c)?cantieriFilter.delete(c):cantieriFilter.add(c); render(); };
window._removeCant  = function(c){ cantieriFilter.delete(c); render(); };
window._setCat      = function(v){ categoriaFilter=v; render(); };
window._clearCat    = function(){ categoriaFilter=''; render(); };
window._resetAll    = function(){ yearFilter=''; cantieriFilter=new Set(); categoriaFilter=''; render(); };

loadAll();
</script>
</body>
</html>
