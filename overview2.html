<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista Generale — Costi Cantieri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#eceae4;--surface3:#f9f8f5;
  --border:#e0dcd4;--border2:#ccc8bf;
  --text:#1a1917;--text2:#6b6760;--text3:#aaa89f;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-light:#bfdbfe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-light:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-light:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand .icon{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-brand .icon svg{width:16px;height:16px;fill:#fff}
.topbar-brand h1{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-brand .sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:6px}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:11px}
.wrap{max-width:1440px;margin:0 auto;padding:22px 28px}

/* ── FILTER PANEL ── */
.filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px}
.filter-panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.filter-section{margin-bottom:12px}
.filter-section:last-child{margin-bottom:0}
.filter-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;user-select:none}
.pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.pill.on-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.pill.on-green{background:var(--green);color:#fff;border-color:var(--green)}
.pill.on-amber{background:var(--amber);color:#fff;border-color:var(--amber)}
.fsearch{width:100%;height:32px;padding:0 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;margin-top:2px}
.fsearch:focus{border-color:var(--blue)}

/* ACTIVE FILTER CHIPS */
.active-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}
.active-bar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s}
.chip-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.chip-blue:hover{background:#dbeafe}
.chip-green{background:var(--green-bg);color:var(--green);border-color:var(--green-light)}
.chip-green:hover{background:#dcfce7}
.chip-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-light)}
.chip-amber:hover{background:#fef3c7}
.chip-x{font-size:14px;line-height:1;margin-left:1px;opacity:.6}
.reset-all{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;margin-left:4px}
.reset-all:hover{color:var(--red)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.kpi-value{font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1}
.kpi-value.sm{font-size:16px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.kpi-accent-blue .kpi-value{color:var(--blue)}
.kpi-accent-green .kpi-value{color:var(--green)}
.kpi-accent-amber .kpi-value{color:var(--amber)}
.kpi-accent-purple .kpi-value{color:var(--purple)}

/* CARDS & CHARTS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--surface)}
tbody td{padding:9px 10px;border-bottom:1px solid #f3f1ec;font-size:12px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface3)}
.num{text-align:right;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap}
.trunc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-cell{min-width:120px}
.bar-wrap{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--surface2);gap:1px}
.bar-seg{height:100%}
.bar-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--text3)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--text3)}
.total-row td{font-weight:600;background:var(--surface3)!important;border-top:1px solid var(--border2)}
.section-head{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.section-head h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.alert{border-radius:var(--r);padding:11px 14px;font-size:12px;margin-bottom:14px;display:none;border:1px solid}
.alert-red{background:var(--red-bg);color:var(--red);border-color:#fecaca}
.alert-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-light)}
.state-box{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-step{font-size:11px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace}

/* FILTER STATUS BANNER */
.filter-status{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:var(--r);margin-bottom:16px;font-size:12px;color:var(--blue);flex-wrap:wrap}
.filter-status strong{font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="icon"><svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zm7 0h5v5H9zm0 7h5v5H9zM2 9h5v5H2z"/></svg></div>
    <h1>Vista Generale Cantieri</h1>
    <span class="sub" id="meta-info">caricamento...</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-sm" onclick="loadAll()">↻ Aggiorna</button>
    <a href="./dashboard_fatture_1.html" class="btn btn-sm">Fatture →</a>
    <a href="../presenze/" class="btn btn-sm">Presenze →</a>
  </div>
</div>

<div class="wrap">
  <div class="alert alert-red" id="err-box"></div>
  <div class="alert alert-amber" id="warn-box"></div>
  <div id="root">
    <div class="state-box">
      <div class="spinner"></div>
      <p style="font-size:14px;font-weight:500">Caricamento dati...</p>
      <div class="load-step" id="load-step">Connessione ai fogli Google...</div>
    </div>
  </div>
</div>

<script>
const URL_FATTURE  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7CrgavtKZ1lfDpoU0_ydZ4_5LMEGELUn00y0Ve62pm0NGCS353e0ZWzyUT3M5BhKEVgq9oHX1-3Wn/pub?output=csv&gid=1367053986';
const URL_PRESENZE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh4s5_G_F6JSMly4krWfEVbYZCLDRsddlIX0OlfQs4Lhqk2OKOB_oYOXgYY0YlL9nvKz5hWkkq2jYD/pub?gid=0&single=true&output=csv';
const SPECIALI     = ['vincenzo','valentin'];
const MAPPING = [
  {presenze:'Aeroporto Oscar Savini a Bracciano (RM)', fatture:'aeroporto savini',          label:'Aeroporto Savini'},
  {presenze:'Autostrade Fiano Romano',                 fatture:'Autostrade',                label:'Autostrade Fiano Romano'},
  {presenze:'Cantiere Anticoli Corrado',               fatture:'ANTICOLI CORRADO',          label:'Anticoli Corrado'},
  {presenze:'Cantiere comune di Canale di Monterano',  fatture:'Canale Monterano',          label:'Canale Monterano'},
  {presenze:'Cantiere Studio del Notariato',           fatture:'Cassa del Notariato',       label:'Studio del Notariato'},
  {presenze:'Sede Operativa 1 - Giardinetti',          fatture:null,                        label:'Sede Giardinetti'},
  {presenze:'Via Don Primo Mazzolari - Comune di Roma',fatture:null,                        label:'Via Don Primo Mazzolari'},
  {presenze:null,                                      fatture:'borghesiana ED',            label:'Borghesiana'},
  {presenze:null,                                      fatture:'APPARTAMENTO',              label:'Appartamento'},
];

// rc_center → label lookup
const RC_TO_LABEL={};
MAPPING.forEach(m=>{if(m.fatture)RC_TO_LABEL[m.fatture]=m.label});

// presenze key → label lookup
const PRES_TO_LABEL={};
MAPPING.forEach(m=>{if(m.presenze)PRES_TO_LABEL[m.presenze]=m.label});

// ── UTILS ──
function num(v){
  if(!v&&v!==0)return 0;
  const s=String(v).trim().replace(/\s/g,'');
  if(s.includes(',')&&s.includes('.'))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
  if(s.includes(','))return parseFloat(s.replace(',','.'))||0;
  return parseFloat(s)||0;
}
function eur(v){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(num(v))}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'—'}
function getYear(d){try{const y=new Date(d).getFullYear();return isNaN(y)?null:y+''}catch{return null}}
function step(m){const el=document.getElementById('load-step');if(el)el.textContent=m}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── PARSE ──
function parseFatture(text){
  const r=Papa.parse(text,{header:true,skipEmptyLines:true,
    transformHeader:h=>h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  return r.data.map(row=>({
    rc_center:(row.rc_center||'').trim()||'Non assegnato',
    cantiere_label:RC_TO_LABEL[(row.rc_center||'').trim()]||null,
    amount_gross:num(row.amount_gross),
    amount_net:num(row.amount_net),
    date:row.date||'',
    year:getYear(row.date),
    supplier:(row.supplier_name||'').trim(),
    description:(row.description||'').trim(),
  }));
}

function parsePresenze(text){
  const lines=text.trim().split(/\r?\n/);
  function pr(line){const cols=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){cols.push(c);c=''}else c+=ch}cols.push(c);return cols}
  const hdr=pr(lines[0]).map(h=>h.replace(/"/g,'').trim());
  function get(cols,name){const i=hdr.indexOf(name);return i>=0?(cols[i]||'').replace(/"/g,'').trim():''}
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=pr(lines[i]);
    if(get(c,'Verso')!=='Entrata')continue;
    const dr=get(c,'Data');if(!dr)continue;
    const parts=dr.split('/');
    const dateISO=parts.length===3?`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`:dr;
    const nome=get(c,'Nome');
    const costo=SPECIALI.some(s=>nome.toLowerCase().startsWith(s))?150:100;
    const cantiere_raw=get(c,'Cantiere');
    rows.push({
      cantiere_raw,
      cantiere_label:PRES_TO_LABEL[cantiere_raw]||cantiere_raw||'Non assegnato',
      nome,cognome:get(c,'Cognome'),
      data:dateISO,year:getYear(dateISO),costo
    });
  }
  return rows;
}

// ── STATE ──
let fatture=[],presenze=[];

// FILTERS — tre dimensioni indipendenti, tutti AND
let F = {
  anni:    new Set(), // set di anni selezionati (vuoto = tutti)
  cantieri:new Set(), // set di cantiere_label selezionati (vuoto = tutti)
  categoria:'',       // testo libero su description/supplier
};

// ── APPLICAZIONE FILTRI ──
// Restituisce le fatture che passano TUTTI e TRE i filtri
function filteredFatture(){
  return fatture.filter(r=>{
    if(F.anni.size>0    && !F.anni.has(r.year))         return false;
    if(F.cantieri.size>0&& !F.cantieri.has(r.cantiere_label)) return false;
    if(F.categoria){
      const q=F.categoria.toLowerCase();
      const hay=(r.description+' '+r.supplier).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// Restituisce le presenze che passano anni + cantieri
function filteredPresenze(){
  return presenze.filter(r=>{
    if(F.anni.size>0    && !F.anni.has(r.year))             return false;
    if(F.cantieri.size>0&& !F.cantieri.has(r.cantiere_label)) return false;
    return true;
  });
}

// ── AGGREGAZIONE ──
function buildCantieri(ff, fp){
  const fMap={};
  ff.filter(r=>r.cantiere_label).forEach(r=>{
    if(!fMap[r.cantiere_label])fMap[r.cantiere_label]={gross:0,count:0};
    fMap[r.cantiere_label].gross+=r.amount_gross;
    fMap[r.cantiere_label].count++;
  });
  const pMap={};
  fp.forEach(r=>{
    if(!pMap[r.cantiere_label])pMap[r.cantiere_label]={costo:0,giorni:0};
    pMap[r.cantiere_label].costo+=r.costo;
    pMap[r.cantiere_label].giorni++;
  });
  const rows=[];
  const usedLabels=new Set();
  MAPPING.forEach(m=>{
    const lbl=m.label;
    const f=fMap[lbl]||{gross:0,count:0};
    const p=pMap[lbl]||{costo:0,giorni:0};
    const tot=f.gross+p.costo;
    if(tot===0&&f.count===0&&p.giorni===0)return;
    rows.push({label:lbl,costoForniture:f.gross,numFatture:f.count,
      costoManodopera:p.costo,giorniPresenza:p.giorni,totale:tot,
      matched:!!m.fatture&&!!m.presenze,
      hasFatture:f.count>0,hasPresenze:p.giorni>0});
    usedLabels.add(lbl);
  });
  // Cantieri fuori mapping
  Object.keys(fMap).forEach(lbl=>{
    if(usedLabels.has(lbl)||lbl==='Non assegnato')return;
    const f=fMap[lbl];
    rows.push({label:lbl,costoForniture:f.gross,numFatture:f.count,
      costoManodopera:0,giorniPresenza:0,totale:f.gross,
      matched:false,hasFatture:true,hasPresenze:false});
  });
  Object.keys(pMap).forEach(lbl=>{
    if(usedLabels.has(lbl))return;
    const p=pMap[lbl];
    rows.push({label:lbl,costoForniture:0,numFatture:0,
      costoManodopera:p.costo,giorniPresenza:p.giorni,totale:p.costo,
      matched:false,hasFatture:false,hasPresenze:true});
  });
  return rows.sort((a,b)=>b.totale-a.totale);
}

// ── LOAD ──
async function loadAll(){
  document.getElementById('root').innerHTML=
    '<div class="state-box"><div class="spinner"></div><p style="font-size:14px;font-weight:500">Caricamento...</p><div class="load-step" id="load-step">Connessione...</div></div>';
  clearAlerts();
  try{
    step('Caricamento fatture...');
    const [tF,tP]=await Promise.all([
      fetch(URL_FATTURE,{cache:'no-cache'}).then(r=>{if(!r.ok)throw new Error('fatture HTTP '+r.status);return r.text()}),
      fetch(URL_PRESENZE,{cache:'no-cache'}).then(r=>{if(!r.ok)throw new Error('presenze HTTP '+r.status);return r.text()})
    ]);
    step('Elaborazione...');
    fatture=parseFatture(tF);
    presenze=parsePresenze(tP);
    if(fatture.length<10)showWarn('Fatture: solo '+fatture.length+' righe. Usa il CSV locale se necessario.');
    document.getElementById('meta-info').textContent=
      fatture.length.toLocaleString('it-IT')+' fatture · '+
      presenze.length.toLocaleString('it-IT')+' presenze · '+
      new Date().toLocaleTimeString('it-IT');
    render();
  }catch(e){
    showErr('Errore: '+e.message);
    document.getElementById('root').innerHTML='<div class="state-box"><p>Errore nel caricamento.</p></div>';
  }
}

let SC=null,PC=null,CC=null;

function render(){
  if(SC){SC.destroy();SC=null}
  if(PC){PC.destroy();PC=null}
  if(CC){CC.destroy();CC=null}

  const ff=filteredFatture();
  const fp=filteredPresenze();
  const rows=buildCantieri(ff,fp);

  // Valori per i filtri disponibili (sempre da dati grezzi, non filtrati)
  const allYears=[...new Set([...fatture.map(r=>r.year),...presenze.map(r=>r.year)].filter(Boolean))].sort();
  const allCantLabels=MAPPING
    .filter(m=>fatture.some(r=>r.cantiere_label===m.label)||presenze.some(r=>r.cantiere_label===m.label))
    .map(m=>m.label);

  // Top categorie (da fatture filtrate con anno+cantiere ma SENZA filtro categoria applicato,
  // così l'utente vede le categorie disponibili per il cantiere selezionato)
  const ffForCat=fatture.filter(r=>{
    if(F.anni.size>0    &&!F.anni.has(r.year))          return false;
    if(F.cantieri.size>0&&!F.cantieri.has(r.cantiere_label))return false;
    return r.cantiere_label&&r.description;
  });
  const catMap={};
  ffForCat.forEach(r=>{
    const k=r.description.length>45?r.description.slice(0,45)+'…':r.description;
    catMap[k]=(catMap[k]||0)+r.amount_gross;
  });
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // KPIs
  const totalF=rows.reduce((s,r)=>s+r.costoForniture,0);
  const totalP=rows.reduce((s,r)=>s+r.costoManodopera,0);
  const totale=totalF+totalP;
  const naGross=ff.filter(r=>!r.cantiere_label).reduce((s,r)=>s+r.amount_gross,0);

  // Filtri attivi
  const hasFilters=F.anni.size>0||F.cantieri.size>0||F.categoria;
  const nFiltrate=ff.filter(r=>r.cantiere_label).length;

  document.getElementById('root').innerHTML=`

<!-- FILTER PANEL -->
<div class="filter-panel">
  <div class="filter-panel-title">
    <span>Filtri</span>
    ${hasFilters?`<button class="reset-all" onclick="_resetAll()">Reset tutti i filtri</button>`:''}
  </div>

  <div class="filter-section">
    <div class="filter-section-label">Anno</div>
    <div class="pill-row">
      <span onclick="_toggleAnno('')" class="pill${F.anni.size===0?' on-blue':''}">Tutti</span>
      ${allYears.map(y=>`<span onclick="_toggleAnno('${y}')" class="pill${F.anni.has(y)?' on-blue':''}">${y}</span>`).join('')}
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-section-label">Cantiere <span style="color:var(--text3);font-weight:400;text-transform:none">(selezione multipla)</span></div>
    <div class="pill-row">
      ${allCantLabels.map(c=>`<span onclick="_toggleCant('${esc(c)}')" class="pill${F.cantieri.has(c)?' on-green':''}">${c}</span>`).join('')}
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-section-label">Categoria <span style="color:var(--text3);font-weight:400;text-transform:none">(cerca in descrizione fattura / fornitore)</span></div>
    <input class="fsearch" id="cat-input" type="search"
      placeholder="es. materiale, gasolio, smaltimento..."
      value="${esc(F.categoria)}"
      oninput="_setCat(this.value)">
  </div>

  ${hasFilters?`
  <div class="active-bar">
    <span class="active-bar-label">Attivi:</span>
    ${[...F.anni].map(y=>`<span class="chip chip-blue" onclick="_toggleAnno('${y}')">Anno: ${y}<span class="chip-x">×</span></span>`).join('')}
    ${[...F.cantieri].map(c=>`<span class="chip chip-green" onclick="_toggleCant('${esc(c)}')">Cantiere: ${c}<span class="chip-x">×</span></span>`).join('')}
    ${F.categoria?`<span class="chip chip-amber" onclick="_setCat('')">Categoria: "${F.categoria}"<span class="chip-x">×</span></span>`:''}
  </div>`:''}
</div>

<!-- FILTER STATUS BANNER -->
${hasFilters?`<div class="filter-status">
  <strong>Dati filtrati:</strong>
  ${F.cantieri.size>0?`<span>${[...F.cantieri].join(', ')}</span>`:''}
  ${F.anni.size>0?`<span>· Anno ${[...F.anni].join(', ')}</span>`:''}
  ${F.categoria?`<span>· Categoria contenente "<strong>${F.categoria}</strong>"</span>`:''}
  <span style="margin-left:auto;opacity:.7">${nFiltrate} fatture · ${fp.length} presenze</span>
</div>`:''}

<!-- KPIs -->
<div class="kpis">
  <div class="kpi kpi-accent-blue">
    <div class="kpi-label">Costo totale cantieri</div>
    <div class="kpi-value sm">${eur(totale)}</div>
    <div class="kpi-sub">forniture + manodopera</div>
  </div>
  <div class="kpi kpi-accent-green">
    <div class="kpi-label">Forniture</div>
    <div class="kpi-value sm">${eur(totalF)}</div>
    <div class="kpi-sub">${rows.reduce((s,r)=>s+r.numFatture,0)} fatture assegnate</div>
  </div>
  <div class="kpi kpi-accent-amber">
    <div class="kpi-label">Manodopera</div>
    <div class="kpi-value sm">${eur(totalP)}</div>
    <div class="kpi-sub">${fp.length.toLocaleString('it-IT')} giornate</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">% Manodopera</div>
    <div class="kpi-value">${pct(totalP,totale)}</div>
    <div class="kpi-sub">${pct(totalF,totale)} forniture</div>
  </div>
  <div class="kpi kpi-accent-purple">
    <div class="kpi-label">Cantieri abbinati</div>
    <div class="kpi-value">${rows.filter(r=>r.matched).length}</div>
    <div class="kpi-sub">su ${rows.length} visualizzati</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Non assegnato</div>
    <div class="kpi-value sm" style="color:var(--red)">${eur(naGross)}</div>
    <div class="kpi-sub">${ff.filter(r=>!r.cantiere_label).length} fatture</div>
  </div>
</div>

<!-- CHARTS -->
<div class="chart-grid">
  <div class="card" style="margin-bottom:0">
    <div class="card-title"><span class="dot" style="background:var(--green)"></span>Costo per cantiere — forniture vs manodopera</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Forniture</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>Manodopera</div>
    </div>
    <div style="position:relative;width:100%;height:${Math.max(180,rows.filter(r=>r.totale>0).length*36+50)}px">
      <canvas id="SC"></canvas>
    </div>
  </div>
  <div class="card" style="margin-bottom:0">
    <div class="card-title"><span class="dot" style="background:var(--blue)"></span>Peso % per cantiere</div>
    <div style="position:relative;width:100%;height:260px"><canvas id="PC"></canvas></div>
  </div>
</div>

<!-- CATEGORIA CHART -->
<div class="card">
  <div class="card-title">
    <span class="dot" style="background:var(--amber)"></span>
    Spesa per categoria
    ${F.cantieri.size>0?`<span class="badge b-green" style="font-size:10px">${[...F.cantieri].join(', ')}</span>`:'<span style="font-size:11px;color:var(--text3);font-weight:400">tutti i cantieri assegnati</span>'}
    ${F.categoria?`<span class="badge b-amber" style="font-size:10px">filtro: "${F.categoria}"</span>`:''}
  </div>
  ${topCat.length===0
    ?'<p style="color:var(--text3);font-size:12px;padding:16px 0;text-align:center">Nessuna categoria per i filtri selezionati</p>'
    :`<div style="position:relative;width:100%;height:${Math.max(160,topCat.length*28+50)}px"><canvas id="CC"></canvas></div>`}
</div>

<!-- TABELLA RIEPILOGO CANTIERI -->
<div class="section-head"><h2>Riepilogo cantieri</h2></div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Cantiere</th><th>Stato</th>
        <th style="text-align:right">Forniture</th><th style="text-align:right">N° fatt.</th>
        <th style="text-align:right">Manodopera</th><th style="text-align:right">Giorni</th>
        <th style="text-align:right">Totale</th>
        <th style="min-width:130px">Ripartizione</th>
        <th style="text-align:right">% Man.</th>
      </tr></thead>
      <tbody>
      ${rows.length===0
        ?'<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:28px">Nessun risultato con i filtri attivi</td></tr>'
        :rows.map(r=>{
          const pF=r.totale>0?(r.costoForniture/r.totale*100):0;
          const pM=r.totale>0?(r.costoManodopera/r.totale*100):0;
          const badge=r.matched?'<span class="badge b-green">● abbinato</span>':
            r.hasFatture?'<span class="badge b-amber">solo fatture</span>':
            '<span class="badge b-blue">solo presenze</span>';
          return`<tr>
            <td style="font-weight:500;white-space:nowrap">${r.label}</td>
            <td>${badge}</td>
            <td class="num">${r.costoForniture>0?eur(r.costoForniture):'<span style="color:var(--text3)">—</span>'}</td>
            <td class="num" style="color:var(--text3)">${r.numFatture||'—'}</td>
            <td class="num">${r.costoManodopera>0?eur(r.costoManodopera):'<span style="color:var(--text3)">—</span>'}</td>
            <td class="num" style="color:var(--text3)">${r.giorniPresenza||'—'}</td>
            <td class="num" style="font-weight:600">${eur(r.totale)}</td>
            <td class="bar-cell">
              <div class="bar-wrap">
                <div class="bar-seg" style="width:${pF.toFixed(1)}%;background:#16a34a"></div>
                <div class="bar-seg" style="width:${pM.toFixed(1)}%;background:#2563eb"></div>
              </div>
              <div class="bar-labels"><span>${pF.toFixed(0)}%F</span><span>${pM.toFixed(0)}%M</span></div>
            </td>
            <td class="num">${r.totale>0?pM.toFixed(1)+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot><tr class="total-row">
        <td>TOTALE</td><td></td>
        <td class="num">${eur(totalF)}</td>
        <td class="num" style="color:var(--text3)">${rows.reduce((s,r)=>s+r.numFatture,0)}</td>
        <td class="num">${eur(totalP)}</td>
        <td class="num" style="color:var(--text3)">${rows.reduce((s,r)=>s+r.giorniPresenza,0)}</td>
        <td class="num" style="font-weight:700">${eur(totale)}</td>
        <td></td>
        <td class="num">${pct(totalP,totale)}</td>
      </tr></tfoot>
    </table>
  </div>
</div>

<!-- FATTURE DETTAGLIO (visibile solo quando filtri attivi) -->
${hasFilters?`
<div class="section-head"><h2>Fatture corrispondenti ai filtri (${ff.filter(r=>r.cantiere_label).length})</h2></div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Data</th><th>Fornitore</th><th>Cantiere</th>
        <th>Descrizione/Categoria</th><th style="text-align:right">Lordo</th>
      </tr></thead>
      <tbody>
      ${ff.filter(r=>r.cantiere_label).slice(0,100).map(r=>`<tr>
        <td style="white-space:nowrap;color:var(--text2)">${r.date?new Date(r.date).toLocaleDateString('it-IT'):'—'}</td>
        <td class="trunc" title="${esc(r.supplier)}">${r.supplier||'—'}</td>
        <td><span class="badge b-green" style="font-size:10px">${r.cantiere_label}</span></td>
        <td class="trunc" style="color:var(--text2)" title="${esc(r.description)}">${r.description||'—'}</td>
        <td class="num" style="font-weight:500">${eur(r.amount_gross)}</td>
      </tr>`).join('')}
      ${ff.filter(r=>r.cantiere_label).length>100?`<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:12px;font-size:11px">… e altre ${ff.filter(r=>r.cantiere_label).length-100} fatture. Usa filtri più specifici per ridurre i risultati.</td></tr>`:''}
      </tbody>
    </table>
  </div>
</div>`:''}

${naGross>0?`
<div class="section-head"><h2>Fatture senza cantiere (non assegnato)</h2></div>
<div class="card" style="border-color:#fecaca;background:var(--red-bg)">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <p style="font-weight:600;color:var(--red);margin-bottom:3px">${eur(naGross)} senza cantiere assegnato</p>
      <p style="font-size:12px;color:var(--text2)">${ff.filter(r=>!r.cantiere_label).length} fatture · non incluse nei totali</p>
    </div>
    <a href="./dashboard_fatture_1.html" class="btn btn-sm" style="color:var(--red);border-color:#fecaca">Vai alle fatture →</a>
  </div>
</div>`:''}
`;

  // ── Charts ──
  const cr=rows.filter(r=>r.totale>0);
  const COLORS=['#2563eb','#16a34a','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#0f766e'];

  SC=new Chart(document.getElementById('SC'),{
    type:'bar',
    data:{labels:cr.map(r=>r.label),datasets:[
      {label:'Forniture',data:cr.map(r=>Math.round(r.costoForniture)),backgroundColor:'#16a34a',borderRadius:0,borderWidth:0},
      {label:'Manodopera',data:cr.map(r=>Math.round(r.costoManodopera)),backgroundColor:'#2563eb',borderRadius:4,borderWidth:0}
    ]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${eur(ctx.raw)}`}}},
      scales:{
        x:{stacked:true,ticks:{callback:v=>eur(v),font:{size:10},color:'#aaa89f'},grid:{color:'rgba(0,0,0,0.04)'}},
        y:{stacked:true,ticks:{font:{size:12},color:'#6b6760'}}
      }
    }
  });

  const pr2=rows.filter(r=>r.totale>0);
  PC=new Chart(document.getElementById('PC'),{
    type:'doughnut',
    data:{labels:pr2.map(r=>r.label),datasets:[{data:pr2.map(r=>Math.round(r.totale)),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:8,boxWidth:10,boxHeight:10}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${eur(ctx.raw)} (${pct(ctx.raw,pr2.reduce((s,r)=>s+r.totale,0))})`}}
      }
    }
  });

  if(topCat.length>0&&document.getElementById('CC')){
    // Se filtro categoria attivo, evidenzia le barre che contengono il testo
    const highlight=F.categoria.toLowerCase();
    CC=new Chart(document.getElementById('CC'),{
      type:'bar',
      data:{labels:topCat.map(x=>x[0]),datasets:[{
        label:'Importo',
        data:topCat.map(x=>Math.round(x[1])),
        backgroundColor:topCat.map(x=>highlight&&x[0].toLowerCase().includes(highlight)?'#d97706':'#fbbf24'),
        borderRadius:4,borderWidth:0
      }]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${eur(ctx.raw)}`}}},
        scales:{
          x:{ticks:{callback:v=>eur(v),font:{size:10},color:'#aaa89f'},grid:{color:'rgba(0,0,0,0.04)'}},
          y:{ticks:{font:{size:11},color:'#6b6760'}}
        }
      }
    });
  }
}

// ── FILTER HANDLERS ──
window._toggleAnno=function(y){
  if(y===''){F.anni.clear();}
  else{F.anni.has(y)?F.anni.delete(y):F.anni.add(y)}
  render();
};
window._toggleCant=function(c){
  F.cantieri.has(c)?F.cantieri.delete(c):F.cantieri.add(c);
  render();
};
window._setCat=function(v){
  F.categoria=v;
  // Sincronizza l'input se il chip-x ha resettato il valore
  const el=document.getElementById('cat-input');
  if(el&&el.value!==v)el.value=v;
  render();
};
window._resetAll=function(){
  F.anni.clear();F.cantieri.clear();F.categoria='';
  render();
};

function showErr(m){const b=document.getElementById('err-box');b.textContent='⚠ '+m;b.style.display='block'}
function showWarn(m){const b=document.getElementById('warn-box');b.textContent='ℹ '+m;b.style.display='block'}
function clearAlerts(){['err-box','warn-box'].forEach(id=>document.getElementById(id).style.display='none')}

loadAll();
</script>
</body>
</html>
