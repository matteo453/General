<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista Generale — Costi & Controllo Cantieri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#eceae4;--surface3:#f9f8f5;
  --border:#e0dcd4;--border2:#ccc8bf;
  --text:#1a1917;--text2:#6b6760;--text3:#aaa89f;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-light:#bfdbfe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-light:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-light:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand .icon{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-brand .icon svg{width:16px;height:16px;fill:#fff}
.topbar-brand h1{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-brand .sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:6px}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:11px}
.wrap{max-width:1440px;margin:0 auto;padding:22px 28px}

.filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px}
.filter-panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.filter-section{margin-bottom:12px}
.filter-section:last-child{margin-bottom:0}
.filter-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;user-select:none}
.pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.pill.on-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.pill.on-green{background:var(--green);color:#fff;border-color:var(--green)}
.pill.on-amber{background:var(--amber);color:#fff;border-color:var(--amber)}
.fsearch{width:100%;height:32px;padding:0 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;margin-top:2px}
.fsearch:focus{border-color:var(--blue)}

.active-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}
.active-bar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s}
.chip-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.chip-blue:hover{background:#dbeafe}
.chip-green{background:var(--green-bg);color:var(--green);border-color:var(--green-light)}
.chip-green:hover{background:#dcfce7}
.chip-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-light)}
.chip-x{font-size:14px;line-height:1;margin-left:1px;opacity:.6}
.reset-all{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;margin-left:4px}
.reset-all:hover{color:var(--red)}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.kpi-value{font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1}
.kpi-value.sm{font-size:16px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.kpi-accent-blue .kpi-value{color:var(--blue)}
.kpi-accent-green .kpi-value{color:var(--green)}
.kpi-accent-amber .kpi-value{color:var(--amber)}
.kpi-accent-purple .kpi-value{color:var(--purple)}
.kpi-accent-red .kpi-value{color:var(--red)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--surface)}
tbody td{padding:9px 10px;border-bottom:1px solid #f3f1ec;font-size:12px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface3)}
.num{text-align:right;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap}
.trunc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-cell{min-width:120px}
.bar-wrap{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--surface2);gap:1px}
.bar-seg{height:100%}
.bar-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--text3)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-gray{background:var(--surface2);color:var(--text3)}
.total-row td{font-weight:600;background:var(--surface3)!important;border-top:1px solid var(--border2)}
.section-head{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.section-head h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.alert{border-radius:var(--r);padding:11px 14px;font-size:12px;margin-bottom:14px;display:none;border:1px solid}
.alert-red{background:var(--red-bg);color:var(--red);border-color:#fecaca}
.alert-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-light)}
.state-box{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-step{font-size:11px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace}

.filter-status{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:var(--r);margin-bottom:16px;font-size:12px;color:var(--blue);flex-wrap:wrap}
.filter-status strong{font-weight:600}

/* ─── Controllo cantieri: tabella compatta ─── */
.ctrl-tbl{width:100%;border-collapse:collapse}
.ctrl-tbl thead th{padding:9px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface)}
.ctrl-tbl thead th.r{text-align:right}
.ctrl-tbl tbody tr{cursor:pointer;transition:background .1s}
.ctrl-tbl tbody tr:hover{background:var(--blue-bg)}
.ctrl-tbl tbody td{padding:11px 12px;border-bottom:1px solid #f3f1ec;font-size:12px;vertical-align:middle}
.ctrl-tbl tbody tr:last-child td{border-bottom:none}
.ctrl-tbl .num{text-align:right;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap}
.ctrl-tbl .lbl{font-weight:600;font-size:13px}
.ctrl-tbl .sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.ctrl-tbl .pos{color:var(--green)}
.ctrl-tbl .neg{color:var(--red)}
.ctrl-tbl .mini-prog{width:80px;height:4px;border-radius:2px;background:var(--surface2);overflow:hidden;margin-top:3px;display:inline-block;vertical-align:middle}
.ctrl-tbl .mini-prog-seg{height:100%;background:var(--blue)}
.ctrl-tbl .mini-prog-seg.warn{background:var(--amber)}
.ctrl-tbl .mini-prog-seg.danger{background:var(--red)}
.ctrl-tbl .arrow{color:var(--text3);font-size:14px;text-align:right}

/* ─── Pagina dedicata cantiere ─── */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--text3)}
.breadcrumb a{color:var(--blue);text-decoration:none;font-weight:500}
.breadcrumb a:hover{text-decoration:underline}
.cnt-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.cnt-hero-title{font-size:22px;font-weight:600;letter-spacing:-.3px;line-height:1.2}
.cnt-hero-meta{font-size:12px;color:var(--text2);margin-top:6px;font-family:'DM Mono',monospace;line-height:1.6}
.cnt-hero-meta strong{color:var(--text)}
.cnt-hero-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.cnt-section{margin-top:22px}
.cnt-section-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.cnt-section-h::after{content:'';flex:1;height:1px;background:var(--border)}

.cnt-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:16px}

/* Info card completa anagrafica (2 colonne chiave/valore) */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
@media(max-width:700px){.info-grid{grid-template-columns:1fr}}
.info-row{display:grid;grid-template-columns:180px 1fr;gap:0;border-bottom:1px solid #f3f1ec}
.info-row:last-child,.info-row:nth-last-child(2):nth-child(odd){border-bottom:none}
.info-row .k{padding:9px 14px;font-size:11px;color:var(--text3);font-weight:500;background:var(--surface3)}
.info-row .v{padding:9px 14px;font-size:12px;color:var(--text);font-family:'DM Mono',monospace;word-break:break-word}
.info-row .v.empty{color:var(--text3);font-style:italic;font-family:'DM Sans',sans-serif}
.info-row .v a{color:var(--blue);text-decoration:none}
.info-row .v a:hover{text-decoration:underline}

/* ─── Riuso: KPI grandi nella pagina dedicata + sezioni dati ─── */
.ctrl-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.ctrl-k{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.ctrl-k-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.ctrl-k-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;line-height:1.15;letter-spacing:-.3px}
.ctrl-k-val.pos{color:var(--green)}
.ctrl-k-val.neg{color:var(--red)}
.ctrl-k-val.neu{color:var(--text)}
.ctrl-k-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px}
.sal-list{display:flex;flex-direction:column;gap:4px}
.sal-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid #f3f1ec}
.sal-row:last-child{border-bottom:none}
.sal-label{color:var(--text2);font-family:'DM Mono',monospace;font-size:11px}
.sal-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.prog-wrap{height:8px;border-radius:4px;background:var(--surface2);overflow:hidden;margin-top:6px}
.prog-seg{height:100%;background:var(--blue);transition:width .4s}
.prog-seg.warn{background:var(--amber)}
.prog-seg.danger{background:var(--red)}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:8px}
.prog-label:first-child{margin-top:0}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="icon"><svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zm7 0h5v5H9zm0 7h5v5H9zM2 9h5v5H2z"/></svg></div>
    <h1>Vista Generale Cantieri</h1>
    <span class="sub" id="meta-info">caricamento...</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-sm" onclick="loadAll()">↻ Aggiorna</button>
    <a href="./presenze.html" class="btn btn-sm">Presenze →</a>
  </div>
</div>

<div class="wrap">
  <div class="alert alert-red" id="err-box"></div>
  <div class="alert alert-amber" id="warn-box"></div>
  <div id="root">
    <div class="state-box">
      <div class="spinner"></div>
      <p style="font-size:14px;font-weight:500">Caricamento dati...</p>
      <div class="load-step" id="load-step">Connessione ai fogli Google...</div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CONFIG — COMPILA QUI SOTTO
   ═══════════════════════════════════════════════════════════════════════ */

// 1) URL CSV delle fatture (FIC export) — invariato
const URL_FATTURE  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7CrgavtKZ1lfDpoU0_ydZ4_5LMEGELUn00y0Ve62pm0NGCS353e0ZWzyUT3M5BhKEVgq9oHX1-3Wn/pub?output=csv&gid=1367053986';

// 2) URL CSV delle presenze (Geobadge HR) — invariato
const URL_PRESENZE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh4s5_G_F6JSMly4krWfEVbYZCLDRsddlIX0OlfQs4Lhqk2OKOB_oYOXgYY0YlL9nvKz5hWkkq2jYD/pub?gid=0&single=true&output=csv';

// 3) ID del foglio master (tab "cantieri" + "tariffe_dipendenti").
//    Deve essere in "Chiunque con il link → Visualizzatore".
const MASTER_SHEET_ID = 'INCOLLA_QUI_LO_SHEET_ID_DEL_MASTER';

// 4) Tariffa default se un dipendente non è in tariffe_dipendenti
const TARIFFA_DEFAULT = 100;

// 5) Fallback mapping cantieri — usato SOLO se il master non è caricabile o è vuoto.
//    Rispecchia il vecchio array MAPPING hardcoded del file originale.
//    Serve come safety net: se il master va giù, la dashboard continua a mostrare numeri sensati.
const FALLBACK_MAPPING = [
  {presenze:'Aeroporto Oscar Savini a Bracciano (RM)', fatture:'aeroporto savini',   label:'Aeroporto Savini'},
  {presenze:'Autostrade Fiano Romano',                 fatture:'Autostrade',         label:'Autostrade Fiano Romano'},
  {presenze:'Cantiere Anticoli Corrado',               fatture:'ANTICOLI CORRADO',   label:'Anticoli Corrado'},
  {presenze:'Cantiere comune di Canale di Monterano',  fatture:'Canale Monterano',   label:'Canale Monterano'},
  {presenze:'Cantiere Studio del Notariato',           fatture:'Cassa del Notariato',label:'Studio del Notariato'},
  {presenze:'Sede Operativa 1 - Giardinetti',          fatture:null,                 label:'Sede Giardinetti'},
  {presenze:'Via Don Primo Mazzolari - Comune di Roma',fatture:null,                 label:'Via Don Primo Mazzolari'},
  {presenze:null,                                      fatture:'borghesiana ED',     label:'Borghesiana'},
  {presenze:null,                                      fatture:'APPARTAMENTO',       label:'Appartamento'},
];

/* ═══════════════════════════════════════════════════════════════════════ */

const gvizUrl = (sheetId, tab) =>
  `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;

const URL_MASTER_CANTIERI = gvizUrl(MASTER_SHEET_ID, 'cantieri');
const URL_MASTER_TARIFFE  = gvizUrl(MASTER_SHEET_ID, 'tariffe_dipendenti');

// ── UTILS ──
function num(v){
  if(!v&&v!==0) return 0;
  const s = String(v).trim().replace(/[€\s]/g,'');
  if(s.includes(',')&&s.includes('.')) return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
  if(s.includes(',')) return parseFloat(s.replace(',','.'))||0;
  return parseFloat(s)||0;
}
function eur(v){
  return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(num(v));
}
function pct(a,b){ return b>0 ? ((a/b)*100).toFixed(1)+'%' : '—'; }
function getYear(d){ try{ const y=new Date(d).getFullYear(); return isNaN(y)?null:y+''; }catch{ return null; } }
function step(m){ const el=document.getElementById('load-step'); if(el) el.textContent=m; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATE ──
let TARIFFE = {};        // nome_lower → {tariffa_giornaliera, ruolo, area}
let CANTIERI = [];       // [{codice, label, nome_presenze, nome_fatture, tipo, cliente, stato, sheet_id, note}]
let MAPPING = [];        // derivato da CANTIERI: [{presenze, fatture, label}]
let RC_TO_LABEL = {};    // nome_fatture → label
let PRES_TO_LABEL = {};  // nome_presenze → label
let fatture = [];
let presenze = [];
let EXPORTS = {};        // codice_cantiere → dizionario dashboard_export
let MAPPING_SOURCE = 'none'; // 'master' | 'fallback' | 'none' — per diagnostica
const warnings = [];

let F = { anni: new Set(), cantieri: new Set(), categoria: '' };

function tariffa(nome){
  const n = (nome||'').toLowerCase().trim();
  return (TARIFFE[n] && TARIFFE[n].tariffa_giornaliera) || TARIFFA_DEFAULT;
}

// ── PARSE MASTER ──
function parseTariffe(csv){
  const r = Papa.parse(csv, {header:true, skipEmptyLines:true,
    transformHeader:h => h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  r.data.forEach(row => {
    const nome = (row.nome||'').toLowerCase().trim();
    if(!nome) return;
    TARIFFE[nome] = {
      tariffa_giornaliera: num(row.tariffa_giornaliera),
      ruolo: (row.ruolo||'').trim(),
      area:  (row.area||'').trim().toLowerCase(),
    };
  });
}

// Estrae lo Sheet ID dal campo: accetta sia un ID nudo che un URL completo.
// Avvisa se è un Published ID (incompatibile con /gviz/tq).
function extractSheetId(v){
  if(!v) return '';
  v = v.trim();
  // Se contiene '/d/' è un URL → estraggo quello che sta subito dopo (ignorando /d/e/ dei published).
  const m = v.match(/\/d\/(?:e\/)?([a-zA-Z0-9_-]+)/);
  const id = m ? m[1] : v;
  if(id.startsWith('2PACX')){
    warnings.push('Sheet ID "'+id.slice(0,18)+'..." è un Published ID (inizia con 2PACX) e non è compatibile con /gviz/tq. Usa il Sheet ID normale, quello tra /d/ e /edit nell\'URL del foglio aperto in editor.');
  }
  return id;
}

function parseCantieri(csv){
  const r = Papa.parse(csv, {header:true, skipEmptyLines:true,
    transformHeader:h => h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  const labelIssues = [];
  CANTIERI = r.data
    .filter(row => {
      // Accetta se c'è almeno UNA tra label, nome_presenze, nome_fatture.
      // (Prima filtravo solo su label/codice: scartavo righe di mapping valide senza codice compilato.)
      return (row.label||'').trim() || (row.nome_presenze||'').trim() || (row.nome_fatture||'').trim();
    })
    .map(row => {
      const nomePres = (row.nome_presenze||'').trim();
      const nomeFat  = (row.nome_fatture||'').trim();
      let label = (row.label||'').trim();
      if(!label){
        // Genera label dal primo campo disponibile
        label = nomePres || nomeFat;
        labelIssues.push(label);
      }
      return {
        codice:        (row.codice||'').trim(),
        label,
        nome_presenze: nomePres,
        nome_fatture:  nomeFat,
        tipo:          (row.tipo||'').trim().toLowerCase(),
        cliente:       (row.cliente||'').trim(),
        stato:         (row.stato||'').trim().toLowerCase(),
        sheet_id:      extractSheetId(row.sheet_id||''),
        note:          (row.note||'').trim(),
      };
    });

  if(labelIssues.length){
    warnings.push(labelIssues.length + ' cantieri senza "label": auto-generata dal nome. Compila la colonna B per stabilità. Righe: ' + labelIssues.slice(0,3).join(', ') + (labelIssues.length>3?'…':''));
  }

  CANTIERI.forEach(c => {
    if(c.nome_fatture)  RC_TO_LABEL[c.nome_fatture]   = c.label;
    if(c.nome_presenze) PRES_TO_LABEL[c.nome_presenze] = c.label;
  });
  MAPPING = CANTIERI.map(c => ({
    presenze: c.nome_presenze || null,
    fatture:  c.nome_fatture  || null,
    label:    c.label,
  }));
  if(MAPPING.length > 0) MAPPING_SOURCE = 'master';
}

// Attivato se il master non è caricabile o è vuoto.
// Popola MAPPING/RC_TO_LABEL/PRES_TO_LABEL con il fallback hardcoded.
// Lascia CANTIERI vuoto: la sezione "Controllo cantieri" non funzionerà senza master,
// ma il resto della dashboard (KPI, grafici, tabelle) resta utilizzabile.
function applyFallbackMapping(){
  MAPPING = FALLBACK_MAPPING.map(m => ({...m}));
  RC_TO_LABEL = {};
  PRES_TO_LABEL = {};
  MAPPING.forEach(m => {
    if(m.fatture)  RC_TO_LABEL[m.fatture]   = m.label;
    if(m.presenze) PRES_TO_LABEL[m.presenze] = m.label;
  });
  MAPPING_SOURCE = 'fallback';
}

// ── PARSE DATA ──
function parseFatture(text){
  const r = Papa.parse(text, {header:true, skipEmptyLines:true,
    transformHeader:h => h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  return r.data.map(row => ({
    rc_center:      (row.rc_center||'').trim() || 'Non assegnato',
    cantiere_label: RC_TO_LABEL[(row.rc_center||'').trim()] || null,
    amount_gross:   num(row.amount_gross),
    amount_net:     num(row.amount_net),
    date:           row.date||'',
    year:           getYear(row.date),
    supplier:       (row.supplier_name||'').trim(),
    description:    (row.description||'').trim(),
  }));
}

function parsePresenze(text){
  const r = Papa.parse(text, {header:true, skipEmptyLines:true});
  return r.data.map(row => {
    if((row.Verso||'').trim() !== 'Entrata') return null;
    const dr = (row.Data||'').trim();
    const parts = dr.split('/');
    if(parts.length !== 3) return null;
    const dateISO = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    const nome = (row.Nome||'').trim();
    const cantiere_raw = (row.Cantiere||'').trim();
    return {
      cantiere_raw,
      cantiere_label: PRES_TO_LABEL[cantiere_raw] || cantiere_raw || 'Non assegnato',
      nome,
      cognome: (row.Cognome||'').trim(),
      data: dateISO,
      year: getYear(dateISO),
      costo: tariffa(nome),
    };
  }).filter(Boolean);
}

// ── PARSE dashboard_export (2 blocchi chiave/valore affiancati + blocco sotto) ──
function parseExport(csv){
  const rows = Papa.parse(csv, {skipEmptyLines:false}).data;
  const dict = {};
  for(const row of rows){
    if(!row) continue;
    // blocco sinistro (col 0-1)
    const k1 = (row[0]||'').trim();
    if(k1 && k1.toLowerCase() !== 'chiave'){
      dict[k1] = (row[1]||'').trim();
    }
    // blocco destro (col 3-4) se presente
    if(row.length >= 5){
      const k2 = (row[3]||'').trim();
      if(k2 && k2.toLowerCase() !== 'chiave'){
        dict[k2] = (row[4]||'').trim();
      }
    }
  }
  return dict;
}

// ── LOAD ──
async function loadAll(){
  document.getElementById('root').innerHTML =
    '<div class="state-box"><div class="spinner"></div><p style="font-size:14px;font-weight:500">Caricamento...</p><div class="load-step" id="load-step">Connessione...</div></div>';
  clearAlerts();
  warnings.length = 0;

  try {
    // Fase 1: master + dati base
    step('Caricamento master (cantieri + tariffe)...');
    const [tar, can, fat, pre] = await Promise.allSettled([
      fetch(URL_MASTER_TARIFFE,  {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('master/tariffe HTTP '+r.status)),
      fetch(URL_MASTER_CANTIERI, {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('master/cantieri HTTP '+r.status)),
      fetch(URL_FATTURE,  {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('fatture HTTP '+r.status)),
      fetch(URL_PRESENZE, {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('presenze HTTP '+r.status)),
    ]);

    if(tar.status === 'fulfilled') parseTariffe(tar.value);
    else { warnings.push('Tariffe master non caricate: uso default €'+TARIFFA_DEFAULT); }

    if(can.status === 'fulfilled'){
      parseCantieri(can.value);
      if(MAPPING.length === 0){
        warnings.push('Tab "cantieri" del master è vuoto. Uso fallback hardcoded con ' + FALLBACK_MAPPING.length + ' cantieri.');
        applyFallbackMapping();
      }
    } else {
      warnings.push('Master cantieri non caricato (' + can.reason + '). Uso fallback hardcoded.');
      applyFallbackMapping();
    }

    if(fat.status !== 'fulfilled') throw new Error('Fatture non caricate: ' + fat.reason);
    if(pre.status !== 'fulfilled') throw new Error('Presenze non caricate: ' + pre.reason);

    step('Elaborazione fatture e presenze...');
    fatture  = parseFatture(fat.value);
    presenze = parsePresenze(pre.value);

    // Fase 2: dashboard_export di ogni cantiere con sheet_id
    const cantieriConFile = CANTIERI.filter(c => c.sheet_id && c.tipo === 'appalto' && c.stato !== 'chiuso');
    step(`Caricamento ${cantieriConFile.length} file cantiere...`);
    const exportResults = await Promise.allSettled(
      cantieriConFile.map(c =>
        fetch(gvizUrl(c.sheet_id, 'dashboard_export'), {cache:'no-cache'})
          .then(r => r.ok ? r.text() : Promise.reject('HTTP '+r.status))
          .then(txt => ({codice: c.codice, dict: parseExport(txt)}))
      )
    );
    exportResults.forEach((res, i) => {
      const c = cantieriConFile[i];
      if(res.status === 'fulfilled'){
        EXPORTS[c.codice] = res.value.dict;
      } else {
        warnings.push(`File cantiere "${c.label}" non caricato (sheet_id: ${c.sheet_id.slice(0,12)}...). Verifica permessi "Chiunque con il link".`);
      }
    });

    document.getElementById('meta-info').textContent =
      fatture.length.toLocaleString('it-IT')+' fatture · '+
      presenze.length.toLocaleString('it-IT')+' presenze · '+
      MAPPING.length+' cantieri ('+MAPPING_SOURCE+') · '+
      Object.keys(EXPORTS).length+' con controllo · '+
      new Date().toLocaleTimeString('it-IT');

    if(warnings.length) showWarn(warnings.join(' • '));
    render();
  } catch(e){
    showErr('Errore: '+e.message);
    document.getElementById('root').innerHTML='<div class="state-box"><p>Errore nel caricamento.</p></div>';
  }
}

// ── FILTRI ──
function filteredFatture(){
  return fatture.filter(r => {
    if(F.anni.size>0     && !F.anni.has(r.year)) return false;
    if(F.cantieri.size>0 && !F.cantieri.has(r.cantiere_label)) return false;
    if(F.categoria){
      const q = F.categoria.toLowerCase();
      const hay = (r.description+' '+r.supplier).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function filteredPresenze(){
  return presenze.filter(r => {
    if(F.anni.size>0     && !F.anni.has(r.year)) return false;
    if(F.cantieri.size>0 && !F.cantieri.has(r.cantiere_label)) return false;
    return true;
  });
}

// ── AGGREGAZIONE ──
function buildCantieri(ff, fp){
  const fMap = {};
  ff.filter(r => r.cantiere_label).forEach(r => {
    if(!fMap[r.cantiere_label]) fMap[r.cantiere_label] = {gross:0, count:0};
    fMap[r.cantiere_label].gross += r.amount_gross;
    fMap[r.cantiere_label].count++;
  });
  const pMap = {};
  fp.forEach(r => {
    if(!pMap[r.cantiere_label]) pMap[r.cantiere_label] = {costo:0, giorni:0};
    pMap[r.cantiere_label].costo += r.costo;
    pMap[r.cantiere_label].giorni++;
  });
  const rows = [];
  const usedLabels = new Set();
  MAPPING.forEach(m => {
    const lbl = m.label;
    const f = fMap[lbl] || {gross:0, count:0};
    const p = pMap[lbl] || {costo:0, giorni:0};
    const tot = f.gross + p.costo;
    if(tot===0 && f.count===0 && p.giorni===0) return;
    rows.push({label:lbl, costoForniture:f.gross, numFatture:f.count,
      costoManodopera:p.costo, giorniPresenza:p.giorni, totale:tot,
      matched: !!m.fatture && !!m.presenze,
      hasFatture: f.count>0, hasPresenze: p.giorni>0});
    usedLabels.add(lbl);
  });
  Object.keys(fMap).forEach(lbl => {
    if(usedLabels.has(lbl) || lbl === 'Non assegnato') return;
    const f = fMap[lbl];
    rows.push({label:lbl, costoForniture:f.gross, numFatture:f.count,
      costoManodopera:0, giorniPresenza:0, totale:f.gross,
      matched:false, hasFatture:true, hasPresenze:false});
  });
  Object.keys(pMap).forEach(lbl => {
    if(usedLabels.has(lbl)) return;
    const p = pMap[lbl];
    rows.push({label:lbl, costoForniture:0, numFatture:0,
      costoManodopera:p.costo, giorniPresenza:p.giorni, totale:p.costo,
      matched:false, hasFatture:false, hasPresenze:true});
  });
  return rows.sort((a,b) => b.totale - a.totale);
}

// Aggregazione specifica per le card "Controllo cantieri"
function buildControlCards(){
  // Prendo tutti i cantieri attivi con dashboard_export
  return CANTIERI
    .filter(c => c.tipo === 'appalto' && c.stato !== 'chiuso' && EXPORTS[c.codice])
    .map(c => {
      const d = EXPORTS[c.codice];

      // Consuntivo reale (non filtrato per anno/categoria — sempre tutto il cantiere)
      const realF = fatture
        .filter(r => r.cantiere_label === c.label)
        .reduce((s,r) => s+r.amount_gross, 0);
      const realM = presenze
        .filter(r => r.cantiere_label === c.label)
        .reduce((s,r) => s+r.costo, 0);
      const giorniM = presenze.filter(r => r.cantiere_label === c.label).length;
      const realTot = realF + realM;

      // Importi contrattuali
      const contrattoNetto = num(d.totale_contratto);
      const ods1 = num(d.ods_1_importo);
      const ods2 = num(d.ods_2_importo);
      const ods3 = num(d.ods_3_importo);
      const ods4 = num(d.ods_4_importo);
      const odsTot = ods1 + ods2 + ods3 + ods4;
      const contrattoAttuale = contrattoNetto + odsTot;

      // SAL e incassi
      const anticipo = num(d.anticipo_importo);
      const sal1 = num(d.sal_1_importo);
      const sal2 = num(d.sal_2_importo);
      const sal3 = num(d.sal_3_importo);
      const totIncassato = num(d.totale_incassato);
      const rimanenza = num(d.totale_rimanenza);

      // Margine
      const margineCorrente = contrattoAttuale - realTot;
      const marginePct = contrattoAttuale > 0 ? (margineCorrente/contrattoAttuale)*100 : 0;
      const avanzamentoEcon = contrattoAttuale > 0 ? (realTot/contrattoAttuale)*100 : 0;
      const avanzamentoFatt = contrattoAttuale > 0 ? (totIncassato/contrattoAttuale)*100 : 0;

      return {
        c, d,
        contrattoNetto, odsTot, contrattoAttuale,
        realF, realM, realTot, giorniM,
        anticipo, sal1, sal2, sal3, totIncassato, rimanenza,
        margineCorrente, marginePct,
        avanzamentoEcon, avanzamentoFatt,
      };
    })
    .sort((a,b) => b.contrattoAttuale - a.contrattoAttuale);
}

// Riga compatta nella tabella "Controllo cantieri" dell'overview

  const { c, contrattoAttuale, realTot, margineCorrente, marginePct,
          avanzamentoEcon, avanzamentoFatt, totIncassato } = x;

  const margClass = margineCorrente >= 0 ? 'pos' : 'neg';
  const econCls = avanzamentoEcon > 100 ? 'danger' : (avanzamentoEcon > 80 ? 'warn' : '');

  return `<tr onclick="_openCantiere('${esc(c.codice)}')">

    <td class="num">${eur(realTot)}</td>
    <td class="num ${margClass}">${eur(margineCorrente)}<br><span style="font-size:10px;color:var(--text3)">${marginePct.toFixed(1)}%</span></td>
    <td class="num">${avanzamentoEcon.toFixed(0)}%<br><span class="mini-prog"><span class="mini-prog-seg ${econCls}" style="width:${econProg.toFixed(1)}%"></span></span></td>

`;
}

// Alias: dopo un cambio stato, ridisegna la route corrente
function render(){ route(); }

// ── Filter handlers ──
window._toggleAnno = function(y){
  if(y === '') F.anni.clear();
  else F.anni.has(y) ? F.anni.delete(y) : F.anni.add(y);
  render();
};
window._toggleCant = function(c){
  F.cantieri.has(c) ? F.cantieri.delete(c) : F.cantieri.add(c);
  render();
};
window._setCat = function(v){
  F.categoria = v;
  const el = document.getElementById('cat-input');
  if(el && el.value !== v) el.value = v;
  render();
};
window._resetAll = function(){
  F.anni.clear(); F.cantieri.clear(); F.categoria = '';
  render();
};

function showErr(m){ const b = document.getElementById('err-box'); b.textContent = '⚠ '+m; b.style.display = 'block'; }
function showWarn(m){ const b = document.getElementById('warn-box'); b.textContent = 'ℹ '+m; b.style.display = 'block'; }
function clearAlerts(){ ['err-box','warn-box'].forEach(id => document.getElementById(id).style.display = 'none'); }

loadAll();
</script>
</body>
